# —————————
# 基础设置
mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
ipv6: true
mode: Rule
allow-lan: true
disable-keep-alive: true
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
experimental:
  http-headers:
    request:
      - name: "User-Agent"
        value: "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Mobile Safari/537.36"
      - name: "Accept-Language"
        value: "en-US,en;q=0.9"
unified-delay: true
tcp-concurrent: false # 【优化】关闭无谓的 TCP 并发追踪栈，节省内存
log-level: silent
find-process-mode: strict # 【关键优化】将 always 改为 strict，阻止 Android 内核级的高频轮询，释放大量 RAM 和 CPU
global-client-fingerprint: chrome
external-controller: 0.0.0.0:9090
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-ui: "./Web/Zash/"
secret: ""
# —————————

# 健康检查模板
p: &p
  type: http
  interval: 28800
  health-check:
    enable: true
    url: http://cp.cloudflare.com/
    interval: 3600
  proxy: 订阅更新
  header: 
      User-Agent: 
        - "clash-verge/v2.2.3"
        - "ClashMetaForAndroid/2.11.2.Meta"
        - "ClashforWindows/0.19.23"
        - "clash.meta"
        - "mihomo"
# —————————

# 订阅地址相关锚点
A: &A
  filter: "^(?!.*(套餐|重置|剩余|到期|订阅|群|账户|流量|有效期|时间|官网|失联|余额)).*$"
  use:
  - 1.69云
  - 2.Ash
  - 3.赔钱
  - 4.闪电猫
  
All: &All
  type: url-test
  use:
  - 1.69云
  - 2.Ash
  - 3.赔钱
  - 4.闪电猫

proxy-providers: 
  1.69云:
    <<: *p
    override: { additional-prefix: "69云：" }
    path: ./proxies/1.69云.yaml
    url: "https://checkhere.top/link/1CTwvMRxid4Ihzqd?clash=1"

  2.Ash:
    <<: *p
    override: { additional-prefix: "Ash：" }
    path: ./proxies/2.Ash.yaml
    url: "https://kejalrn7ffb572qu0jeb.671234.xyz/signal/channel/receiver?token=bedf2bfde0b34b30a3e1cd8e9f648f51"

  3.赔钱:
    <<: *p
    override: { additional-prefix: "赔钱：" }
    path: ./proxies/3.赔钱.yaml
    url: "https://dash.xn--cp3a08l.com/api/v1/pq/10073f284c1df07e2de1f017ed2c895d"
    
  4.闪电猫:
    <<: *p
    override: { additional-prefix: "闪电猫：" }
    path: ./proxies/4.闪电猫.yaml
    url: "https://tahnk2jz.fastmao.vip/s/8db68dda1926842456d77e9f7f107ec0?burn=MzfkOCe7mSA6Yya4"

# —————————

# 节点记忆
profile:
  store-selected: true
  store-fake-ip: false # 【优化】关闭 Fake-IP 缓存持久化，避免内存驻留和不必要的闪存 I/O
# —————————

# 嗅探模块
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP: { ports: [80, 8080-8880] }
    TLS: { ports: [443, 5228, 8443] }
    QUIC: { ports: [443, 8443] }
  force-domain:
    - "+.v2ex.com"
  skip-domain: 
    - "Mijia Cloud"
# —————————

# 网卡模块 (TUN)
tun:
  enable: false # 保持 false 很好，TProxy 比 TUN 更省内存
  device: Meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
# —————————

# DNS模块
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: redir-host #fake-ip
  fake-ip-range: 172.20.0.1/16
  fake-ip-filter:
    - "rule-set:CN_域"
    - "rule-set:Private_域"
    - "rule-set:GoogleFCM_域"
    - "+.3gppnetwork.org"
    - "+.xtracloud.net"
    - "+.mtalk.google.com"
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8

  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  
  nameserver-policy:
    "rule-set:CN_域,Microsoft_域,Apple_域":
      - https://223.5.5.5/dns-query
      - https://1.12.12.12/dns-query
  
  nameserver:
    - https://8.8.8.8/dns-query#DNS连接
    - https://1.1.1.1/dns-query#DNS连接
# —————————

proxies:
  - {name: 🌐 本机·本地直连, type: direct, udp: true}
  - {name: ⛔️ 禁止·拒绝连接, type: reject}
  - {name: 🌐 DNS_Hijack, type: dns}

proxy_groups: &proxy_groups
    type: select
    proxies:
      - 总模式
      - ALL·延迟最低
      - ALL·延迟最低（无高倍）
      - ALL·负载均衡
      - ALL·故障转移
      - ALL·中国台湾
      - ALL·香港地区
      - ALL·美国地区
      - ALL·日本地区
      - ALL·狮城地区
      - ALL·印度地区
      - ALL·其它地区
      - 低倍率
      - ⛔️ 禁止·拒绝连接
      - 🌐 本机·本地直连
    <<: *A

